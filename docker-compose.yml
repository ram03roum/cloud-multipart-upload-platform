version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: upload-backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - azurite
    networks:
      - upload-network

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: upload-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data"
    volumes:
      - azurite_data:/data
    networks:
      - upload-network

networks:
  upload-network:
  driver: bridge
  
volumes:
  azurite_data: 
